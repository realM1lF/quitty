<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- QuittyPro Logo-Mark: Fußabdruck, dessen Form zugleich ein Blatt ist.
       Handgezeichnet wirkende Strichzeichnung, „mit Fineliner ins Kassenbuch gezeichnet". -->
  <g stroke="#1E5B43" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Äußere Kontur: Fußsohle / Blatt, leicht unregelmäßig -->
    <path d="M 258 88
             C 300 92, 344 118, 362 158
             C 380 198, 374 236, 362 272
             C 350 308, 338 342, 322 378
             C 308 410, 286 434, 254 438
             C 224 442, 200 424, 188 396
             C 174 362, 166 326, 156 290
             C 146 254, 138 214, 146 176
             C 154 138, 190 100, 232 90
             C 240 88, 250 87, 258 88 Z" />
    <!-- Mittelrippe (Blatt-Ader entlang der Fußlängsachse) -->
    <path d="M 262 132
             C 258 190, 252 252, 246 312
             C 242 348, 240 380, 244 404"
          stroke-width="10" opacity="0.85" />
    <!-- Seitenadern links -->
    <path d="M 256 196 C 232 190, 210 192, 194 202" stroke-width="8" opacity="0.7" />
    <path d="M 250 268 C 228 266, 208 272, 194 284" stroke-width="8" opacity="0.7" />
    <!-- Seitenadern rechts -->
    <path d="M 258 176 C 280 168, 302 168, 318 178" stroke-width="8" opacity="0.7" />
    <path d="M 252 244 C 274 240, 296 244, 310 254" stroke-width="8" opacity="0.7" />
    <!-- Zwei Zehen-Punkte -->
    <circle cx="206" cy="72" r="15" fill="#1E5B43" stroke="none" />
    <circle cx="300" cy="58" r="19" fill="#1E5B43" stroke="none" />
  </g>
</svg>
